services:
  api:
    build: .
    container_name: monsta-quest-api
    volumes:
      - ${REPO_PATH:-/Users/gordon/Documents/Tyrell/monster-game}:/repo
    environment:
      - REPO_PATH=/repo
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: monsta-quest-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./game:/usr/share/nginx/html/game:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - default
      - cloudflare-tunnel

networks:
  cloudflare-tunnel:
    external: true
